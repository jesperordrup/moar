<!doctype html>
<html lang="da">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Olde K. danser på kloden</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cherry+Bomb+One&family=Fraunces:opsz,wght@9..144,600&display=swap');

    :root {
      --night: #090716;
      --sea: #126f9a;
      --sea-dark: #08415f;
      --land: #72c36b;
      --land-dark: #2d8b5c;
      --dress: #ff4f9a;
      --gold: #ffd36a;
      --skin: #f2b082;
      --ink: #2a1434;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      overflow: hidden;
      color: #fff7dd;
      background:
        radial-gradient(circle at 18% 18%, rgba(255, 211, 106, .22), transparent 24rem),
        radial-gradient(circle at 82% 26%, rgba(255, 79, 154, .17), transparent 22rem),
        linear-gradient(145deg, #05040c, var(--night) 55%, #17102b);
      font-family: Fraunces, Georgia, serif;
    }

    .stars, .stars::before, .stars::after {
      position: fixed;
      inset: 0;
      content: "";
      pointer-events: none;
      background-image:
        radial-gradient(#fff 1px, transparent 1.6px),
        radial-gradient(#ffd36a 1px, transparent 1.8px);
      background-size: 92px 92px, 147px 147px;
      opacity: .55;
      animation: twinkle 5s ease-in-out infinite alternate;
    }

    .stars::before { transform: rotate(23deg) scale(1.2); opacity: .25; }
    .stars::after { transform: rotate(-12deg) scale(.9); opacity: .35; animation-delay: -2s; }

    main {
      width: min(92vw, 900px);
      aspect-ratio: 1.25;
      display: grid;
      place-items: center;
      position: relative;
    }

    h1 {
      position: fixed;
      top: 1rem;
      left: 50vw;
      margin: 0;
      z-index: 5;
      max-width: 10ch;
      text-align: center;
      font-family: 'Cherry Bomb One', cursive;
      font-size: clamp(2.7rem, 7vw, 6.8rem);
      line-height: .78;
      letter-spacing: .02em;
      color: var(--gold);
      text-shadow: 0 7px 0 #7a2558, 0 18px 45px rgba(0,0,0,.5);
      transform: translateX(-50%) rotate(-5deg);
      animation: title-to-side 1.35s cubic-bezier(.18, .9, .22, 1.12) 1.1s forwards;
    }

    .music-button {
      position: fixed;
      left: 50%;
      top: calc(100vh - 8rem);
      z-index: 10;
      border: 0;
      border-radius: 999px;
      padding: .9rem 1.2rem;
      font: 700 1rem Fraunces, Georgia, serif;
      color: #421035;
      background: linear-gradient(135deg, #fff1a8, var(--gold));
      box-shadow: 0 10px 0 #8f386a, 0 20px 35px rgba(0,0,0,.35);
      cursor: pointer;
      transform: translate(-50%, -50%) rotate(-2deg);
      animation: button-shake .72s ease-in-out infinite;
      transition: left .75s cubic-bezier(.18,.9,.22,1.12), top .75s cubic-bezier(.18,.9,.22,1.12), transform .18s ease, box-shadow .18s ease;
    }

    .music-button:hover {
      box-shadow: 0 13px 0 #8f386a, 0 26px 42px rgba(0,0,0,.4);
    }

    .music-button.playing {
      background: linear-gradient(135deg, #ff8dc1, var(--dress));
      color: white;
      animation: none;
      transform: translate(-50%, -50%) rotate(0deg);
    }

    .scene {
      position: relative;
      width: min(78vmin, 580px);
      height: min(78vmin, 580px);
      display: grid;
      place-items: center;
      transform: translateY(5%);
    }

    .orbit {
      position: absolute;
      width: 115%;
      height: 115%;
      border: 2px dashed rgba(255,255,255,.16);
      border-radius: 50%;
      animation: spin 18s linear infinite;
    }

    .moon {
      position: absolute;
      width: 58px;
      height: 58px;
      border-radius: 50%;
      right: 2%;
      top: 18%;
      background: radial-gradient(circle at 35% 32%, #fff5c8 0 12px, #e5b84b 13px 100%);
      box-shadow: 0 0 45px rgba(255,211,106,.55);
    }

    .earth-system {
      position: absolute;
      inset: 0;
      z-index: 3;
      transform-origin: 50% 62%;
    }

    .scene.impact .mom {
      animation: none;
    }

    .scene.impact .eye {
      width: 10px;
      height: 10px;
      top: 31px;
    }

    .scene.impact .smile {
      top: 48px;
      left: 96px;
      width: 18px;
      height: 22px;
      border: 4px solid #8e3155;
      border-radius: 50%;
      background: #3b1231;
    }

    .globe-wrap {
      position: absolute;
      bottom: 4%;
      width: 76%;
      aspect-ratio: 1;
      filter: drop-shadow(0 42px 35px rgba(0,0,0,.42));
      animation: float 4s ease-in-out infinite;
    }

    .globe {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      overflow: hidden;
      background:
        radial-gradient(circle at 28% 22%, rgba(255,255,255,.55), transparent 12%),
        radial-gradient(circle at 68% 75%, rgba(0,0,0,.28), transparent 36%),
        linear-gradient(120deg, var(--sea), var(--sea-dark));
      box-shadow: inset -28px -38px 45px rgba(0,0,0,.3), inset 18px 20px 35px rgba(255,255,255,.18);
    }

    .globe::before {
      content: "";
      position: absolute;
      inset: -8% -40%;
      background:
        radial-gradient(ellipse at 26% 38%, var(--land) 0 11%, transparent 11.5%),
        radial-gradient(ellipse at 43% 28%, var(--land-dark) 0 13%, transparent 13.5%),
        radial-gradient(ellipse at 58% 55%, var(--land) 0 16%, transparent 16.5%),
        radial-gradient(ellipse at 76% 36%, var(--land-dark) 0 10%, transparent 10.5%),
        radial-gradient(ellipse at 36% 72%, var(--land) 0 9%, transparent 9.5%);
      animation: continents 9s linear infinite;
    }

    .shadow {
      position: absolute;
      bottom: -7%;
      left: 18%;
      width: 64%;
      height: 9%;
      border-radius: 50%;
      background: rgba(0,0,0,.35);
      filter: blur(12px);
      animation: shadow 4s ease-in-out infinite;
    }

    .mom {
      position: absolute;
      z-index: 4;
      bottom: 58%;
      left: 50%;
      width: 190px;
      height: 265px;
      transform-origin: 50% 100%;
      animation: globe-groove 5.2s cubic-bezier(.45,0,.55,1) infinite;
    }

    .head {
      position: absolute;
      top: 5px;
      left: 66px;
      width: 68px;
      height: 72px;
      border-radius: 48% 52% 46% 54%;
      background: var(--skin);
      box-shadow: inset -8px -5px 0 rgba(181,91,73,.22);
    }

    .hair {
      position: absolute;
      top: -8px;
      left: 56px;
      width: 90px;
      height: 82px;
      border-radius: 54% 46% 60% 40%;
      background: #5c2d1d;
      z-index: -1;
      transform: rotate(-8deg);
    }

    .hair::after {
      content: "";
      position: absolute;
      right: 3px;
      bottom: -18px;
      width: 32px;
      height: 58px;
      border-radius: 50%;
      background: #5c2d1d;
    }

    .eye { position: absolute; top: 34px; width: 6px; height: 6px; border-radius: 50%; background: var(--ink); }
    .eye.left { left: 84px; }
    .eye.right { left: 111px; }
    .smile {
      position: absolute;
      top: 48px;
      left: 91px;
      width: 28px;
      height: 14px;
      border-bottom: 4px solid #8e3155;
      border-radius: 0 0 28px 28px;
    }

    .body {
      position: absolute;
      top: 75px;
      left: 51px;
      width: 96px;
      height: 112px;
      background: var(--dress);
      clip-path: polygon(50% 0, 92% 100%, 8% 100%);
      border-radius: 28px 28px 18px 18px;
      box-shadow: inset -10px -8px 0 rgba(120,0,75,.18);
    }

    .arm, .leg {
      position: absolute;
      background: var(--skin);
      border-radius: 999px;
      transform-origin: top center;
    }

    .arm { width: 17px; height: 100px; top: 85px; }
    .arm.left { left: 48px; transform: rotate(126deg); animation: disco-left .9s ease-in-out infinite; }
    .arm.right { left: 132px; transform: rotate(-120deg); animation: disco-right .9s ease-in-out infinite; }

    .leg { width: 19px; height: 86px; top: 174px; background: #f0a476; }
    .leg.left { left: 78px; transform: rotate(18deg); animation: moonwalk-left .9s ease-in-out infinite; }
    .leg.right { left: 112px; transform: rotate(-32deg); animation: moonwalk-right .9s ease-in-out infinite; }

    .shoe {
      position: absolute;
      width: 42px;
      height: 17px;
      border-radius: 16px 16px 9px 9px;
      background: var(--gold);
      bottom: -4px;
      left: -9px;
    }

    .meteor {
      position: fixed;
      left: 0;
      top: 0;
      z-index: 6;
      width: 34px;
      height: 34px;
      border-radius: 50%;
      opacity: 0;
      pointer-events: none;
      background: radial-gradient(circle at 35% 35%, #fff9ca 0 18%, #ff9b35 19% 48%, #8d251b 49% 100%);
      box-shadow: 0 0 26px #ffcf5a, 0 0 64px #ff4f28;
      transform: translate(var(--meteor-start-x, 0), var(--meteor-start-y, 0)) scale(.6);
    }

    .meteor.strike {
      animation: meteor-hit .9s cubic-bezier(.14,.8,.2,1) forwards;
    }

    .hit-effect {
      position: fixed;
      left: 0;
      top: 0;
      z-index: 7;
      width: 24px;
      height: 24px;
      border-radius: 50%;
      opacity: 0;
      pointer-events: none;
      transform: translate(var(--hit-x, 0), var(--hit-y, 0)) translate(-50%, -50%);
    }

    .hit-effect::before,
    .hit-effect::after {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background: radial-gradient(circle, #fff8bb 0 12%, #ff9b35 13% 34%, rgba(255,79,40,.7) 35% 48%, transparent 50%);
      box-shadow: 0 0 35px #ffd36a, 0 0 80px #ff4f28;
    }

    .hit-effect::after {
      background: transparent;
      border: 5px solid rgba(255, 237, 150, .95);
      box-shadow: 0 0 30px #ff4f28;
    }

    .hit-effect.boom {
      animation: hit-pop .75s ease-out forwards;
    }

    .hit-effect.boom::after {
      animation: shockwave .75s ease-out forwards;
    }

    .scene.impact .globe {
      animation: globe-flash .28s ease-out 2;
    }

    .note {
      position: absolute;
      font-family: 'Cherry Bomb One', cursive;
      font-size: 2rem;
      color: #ffeb9a;
      text-shadow: 0 4px 0 #632050;
      animation: rise 2.4s ease-in-out infinite;
    }
    .n1 { left: 9%; top: 42%; animation-delay: -.2s; }
    .n2 { right: 11%; top: 45%; animation-delay: -.9s; }
    .n3 { right: 26%; top: 30%; animation-delay: -1.5s; }

    @keyframes hit-pop {
      0% { opacity: 0; transform: translate(var(--hit-x), var(--hit-y)) translate(-50%, -50%) scale(.25); }
      18% { opacity: 1; transform: translate(var(--hit-x), var(--hit-y)) translate(-50%, -50%) scale(2.3); }
      100% { opacity: 0; transform: translate(var(--hit-x), var(--hit-y)) translate(-50%, -50%) scale(5.8); }
    }

    @keyframes shockwave {
      0% { opacity: 1; transform: scale(.4); }
      100% { opacity: 0; transform: scale(8); }
    }

    @keyframes globe-flash {
      50% { filter: brightness(1.8) saturate(1.7); }
    }

    @keyframes meteor-hit {
      0% { opacity: 0; transform: translate(var(--meteor-start-x), var(--meteor-start-y)) scale(.55); }
      10% { opacity: 1; }
      82% { opacity: 1; transform: translate(var(--meteor-end-x), var(--meteor-end-y)) scale(1.15); }
      100% { opacity: 0; transform: translate(var(--meteor-end-x), var(--meteor-end-y)) scale(2.8); }
    }

    @keyframes head-follow {
      0%, 100% { transform: rotate(0deg); }
      20% { transform: rotate(-18deg); }
      48% { transform: rotate(14deg); }
      72% { transform: rotate(-10deg); }
    }

    @keyframes button-shake {
      0%, 100% { transform: translate(-50%, -50%) rotate(-2deg); }
      15% { transform: translate(calc(-50% - 4px), calc(-50% - 1px)) rotate(-7deg); }
      30% { transform: translate(calc(-50% + 5px), calc(-50% + 1px)) rotate(6deg); }
      45% { transform: translate(calc(-50% - 3px), calc(-50% - 1px)) rotate(-5deg); }
      60% { transform: translate(calc(-50% + 3px), -50%) rotate(4deg); }
      75% { transform: translate(-50%, calc(-50% - 2px)) rotate(-1deg); }
    }

    @keyframes title-to-side {
      0% { left: 50vw; transform: translateX(-50%) rotate(-5deg) scale(1); }
      62% { left: 8vw; transform: translateX(0) rotate(-10deg) scale(.84); }
      100% { left: 0; top: 2rem; transform: translateX(0) rotate(-8deg) scale(.72); }
    }

    @keyframes globe-groove {
      0% { transform: translateX(-50%) translate(-8px, 0) rotate(-8deg) scale(1); }
      12% { transform: translateX(-50%) translate(-92px, 18px) rotate(-24deg) scale(.96); }
      24% { transform: translateX(-50%) translate(-118px, 66px) rotate(-12deg) scale(.9); }
      36% { transform: translateX(-50%) translate(-44px, 92px) rotate(14deg) scale(.88); }
      50% { transform: translateX(-50%) translate(54px, 86px) rotate(22deg) scale(.9); }
      63% { transform: translateX(-50%) translate(120px, 46px) rotate(13deg) scale(.94); }
      76% { transform: translateX(-50%) translate(92px, -4px) rotate(-16deg) scale(1); }
      88% { transform: translateX(-50%) translate(28px, -26px) rotate(18deg) scale(1.04); }
      100% { transform: translateX(-50%) translate(-8px, 0) rotate(-8deg) scale(1); }
    }
    @keyframes disco-left {
      0%, 100% { transform: rotate(132deg); }
      25% { transform: rotate(38deg); }
      50% { transform: rotate(166deg); }
      75% { transform: rotate(82deg); }
    }
    @keyframes disco-right {
      0%, 100% { transform: rotate(-132deg); }
      25% { transform: rotate(-58deg); }
      50% { transform: rotate(-174deg); }
      75% { transform: rotate(-28deg); }
    }
    @keyframes moonwalk-left {
      0%, 100% { transform: rotate(20deg) translateY(0); }
      35% { transform: rotate(-38deg) translateY(-16px); }
      70% { transform: rotate(42deg) translateY(8px); }
    }
    @keyframes moonwalk-right {
      0%, 100% { transform: rotate(-34deg) translateY(0); }
      30% { transform: rotate(54deg) translateY(10px); }
      65% { transform: rotate(-72deg) translateY(-18px); }
    }
    @keyframes continents { to { transform: translateX(28%); } }
    @keyframes float { 50% { transform: translateY(-18px); } }
    @keyframes shadow { 50% { transform: scale(.84); opacity: .2; } }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes twinkle { to { opacity: .82; } }
    @keyframes rise {
      0%, 100% { transform: translateY(18px) rotate(-8deg); opacity: .25; }
      50% { transform: translateY(-22px) rotate(10deg); opacity: 1; }
    }
  </style>
</head>
<body>
  <div class="stars"></div>
  <button class="music-button" type="button" aria-pressed="false">Play &gt;</button>
  <audio id="hammer-audio" src="hammerfedt.mp3" loop preload="auto"></audio>
  <main aria-label="En animeret klode med Olde K. ovenpå">
    <h1>Olde K. danser på kloden</h1>

    <section class="scene">
      <div class="orbit"><div class="moon"></div></div>

      <div class="note n1">♪</div>
      <div class="note n2">♫</div>
      <div class="note n3">♪</div>
      <div class="meteor" aria-hidden="true"></div>
      <div class="hit-effect" aria-hidden="true"></div>

      <div class="mom" aria-hidden="true">
        <div class="hair"></div>
        <div class="head"></div>
        <div class="eye left"></div>
        <div class="eye right"></div>
        <div class="smile"></div>
        <div class="arm left"></div>
        <div class="arm right"></div>
        <div class="body"></div>
        <div class="leg left"><div class="shoe"></div></div>
        <div class="leg right"><div class="shoe"></div></div>
      </div>

      <div class="earth-system">
        <div class="globe-wrap">
          <div class="globe"></div>
          <div class="shadow"></div>
        </div>
      </div>
    </section>
  </main>

  <script>
    const button = document.querySelector('.music-button');
    const audio = document.querySelector('#hammer-audio');
    const scene = document.querySelector('.scene');
    const earthSystem = document.querySelector('.earth-system');
    const meteor = document.querySelector('.meteor');
    const hitEffect = document.querySelector('.hit-effect');
    let moveTimer;
    let meteorTimer;
    let hovering = false;

    function moveButtonRandomly() {
      if (hovering || !audio.paused) return;
      const margin = 70;
      const x = margin + Math.random() * (window.innerWidth - margin * 2);
      const y = margin + Math.random() * (window.innerHeight - margin * 2);
      button.style.left = `${x}px`;
      button.style.top = `${y}px`;
    }

    function startMoving() {
      clearInterval(moveTimer);
      moveTimer = setInterval(moveButtonRandomly, 1400);
    }

    startMoving();
    setTimeout(moveButtonRandomly, 500);

    button.addEventListener('mouseenter', () => {
      hovering = true;
      clearInterval(moveTimer);
    });

    button.addEventListener('mouseleave', () => {
      hovering = false;
      if (audio.paused) startMoving();
    });

    function animateOrbit(pushX, pushY) {
      const duration = 7000;
      const start = performance.now();
      const len = Math.hypot(pushX, pushY) || 1;
      const nx = pushX / len;
      const ny = pushY / len;
      const px = -ny;
      const py = nx;
      const radius = Math.min(window.innerWidth, window.innerHeight) * 0.34;

      earthSystem.classList.add('orbiting');
      scene.classList.add('impact');

      function frame(now) {
        const progress = Math.min((now - start) / duration, 1);
        const theta = progress * Math.PI * 2;

        // Real-ish 3D orbit projected to the screen:
        // x/y follow an angled orbital plane, z controls fake depth.
        const x3 = Math.sin(theta) * radius;
        const y3 = (1 - Math.cos(theta)) * radius * 0.55;
        const z3 = -Math.sin(theta) * radius;
        const screenX = nx * x3 + px * y3;
        const screenY = ny * x3 + py * y3 * 0.55;
        const depth = z3 / radius;
        const behind = Math.max(0, -depth);
        const inFront = Math.max(0, depth);
        const scale = 1 + inFront * 0.22 - behind * 0.72;
        const brightness = 1 + inFront * 0.25 - behind * 0.7;
        const blur = behind * 2.4;
        const zIndex = depth > 0 ? 5 : 1;

        earthSystem.style.zIndex = zIndex;
        earthSystem.style.transform = `translate(${screenX}px, ${screenY}px) scale(${scale})`;
        earthSystem.style.filter = `brightness(${brightness}) blur(${blur}px)`;

        if (progress < 1) {
          requestAnimationFrame(frame);
        } else {
          earthSystem.style.transform = 'translate(0, 0) scale(1)';
          earthSystem.style.filter = 'brightness(1) blur(0)';
          earthSystem.style.zIndex = 3;
          earthSystem.classList.remove('orbiting');
          scene.classList.remove('impact');
        }
      }

      requestAnimationFrame(frame);
    }

    function launchMeteor() {
      const globe = document.querySelector('.globe');
      const globeRect = globe.getBoundingClientRect();
      const centerX = globeRect.left + globeRect.width / 2;
      const centerY = globeRect.top + globeRect.height / 2;
      const angle = Math.random() * Math.PI * 2;
      const viewportRadius = Math.hypot(window.innerWidth, window.innerHeight) + 160;
      const startX = centerX + Math.cos(angle) * viewportRadius;
      const startY = centerY + Math.sin(angle) * viewportRadius;
      const impactOffset = globeRect.width * 0.18;
      const endX = centerX - Math.cos(angle) * impactOffset - 17;
      const endY = centerY - Math.sin(angle) * impactOffset - 17;
      const pushX = -Math.cos(angle) * 1;
      const pushY = -Math.sin(angle) * 1;

      scene.style.setProperty('--meteor-start-x', `${startX}px`);
      scene.style.setProperty('--meteor-start-y', `${startY}px`);
      scene.style.setProperty('--meteor-end-x', `${endX}px`);
      scene.style.setProperty('--meteor-end-y', `${endY}px`);
      scene.style.setProperty('--meteor-angle', `${angle}rad`);
      scene.style.setProperty('--hit-x', `${endX + 17}px`);
      scene.style.setProperty('--hit-y', `${endY + 17}px`);

      meteor.classList.remove('strike');
      hitEffect.classList.remove('boom');
      void meteor.offsetWidth;
      meteor.classList.add('strike');

      setTimeout(() => {
        hitEffect.classList.add('boom');
        animateOrbit(pushX, pushY);
      }, 720);
      meteorTimer = setTimeout(launchMeteor, 9200 + Math.random() * 5200);
    }

    meteorTimer = setTimeout(launchMeteor, 2200 + Math.random() * 2400);

    button.addEventListener('click', async () => {
      if (audio.paused) {
        await audio.play();
        clearInterval(moveTimer);
        button.classList.add('playing');
        button.setAttribute('aria-pressed', 'true');
        button.textContent = 'Stop';
      } else {
        audio.pause();
        if (!hovering) startMoving();
        button.classList.remove('playing');
        button.setAttribute('aria-pressed', 'false');
        button.textContent = 'Play >';
      }
    });
  </script>
</body>
</html>
